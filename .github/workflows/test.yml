name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust:
    name: Rust (check, clippy, test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - run: cargo check
      - run: cargo clippy -- -D warnings
      - run: cargo test

  player-lint:
    name: Player (lint, typecheck, unit tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: player
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: player/package-lock.json

      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run lint
      - run: npm run format:check
      - run: npm run test:unit
